general {
        colors = true
        interval = 5
        output_format = i3bar
}

# dynamic columns

order += "scratchpad_counter"
scratchpad_counter {
    hide_when_none = True
}

order += "arch_updates"
arch_updates {
    cache_timeout = 600
    format = "UPD: {pacman}/{aur}"
    hide_if_zero = True
    on_click 1 = "refresh"
}

order += "keyboard_locks"
keyboard_locks {
    format = '[\?if=caps_lock&color=bad CPSLCK]'
}

order += "group systemd"
group systemd {
    cycle = 5
    format = "{output}"

    systemd {
        format = "{unit}"
        hide_extension = True
        unit = 'sshd.service'
        on_click 1 = 'exec --no-startup-id sudo systemctl restart sshd; exec --no-startup-id killall -USR1 py3status'
        on_click 3 = 'exec --no-startup-id sudo systemctl stop sshd; exec --no-startup-id killall -USR1 py3status'
    }

    systemd {
        format = "{unit}"
        hide_extension = True
        unit = 'nginx.service'
        on_click 1 = 'exec --no-startup-id sudo systemctl restart nginx; exec --no-startup-id killall -USR1 py3status'
        on_click 3 = 'exec --no-startup-id sudo systemctl stop nginx; exec --no-startup-id killall -USR1 py3status'
    }

    systemd {
        format = "{unit}"
        hide_extension = True
        unit = 'postgresql.service'
        on_click 1 = 'exec --no-startup-id sudo systemctl restart postgresql; exec --no-startup-id killall -USR1 py3status'
        on_click 3 = 'exec --no-startup-id sudo systemctl stop postgresql; exec --no-startup-id killall -USR1 py3status'
    }

    systemd {
        format = "{unit}"
        hide_extension = True
        unit = 'libvirtd.service'
        on_click 1 = 'exec --no-startup-id sudo systemctl restart libvirtd; exec --no-startup-id killall -USR1 py3status'
        on_click 3 = 'exec --no-startup-id sudo systemctl stop libvirtd; exec --no-startup-id killall -USR1 py3status'
    }

    systemd {
        format = "{unit}"
        hide_extension = True
        unit = 'docker.service'
        on_click 1 = 'exec --no-startup-id sudo systemctl restart docker; exec --no-startup-id killall -USR1 py3status'
        on_click 3 = 'exec --no-startup-id sudo systemctl stop docker; exec --no-startup-id killall -USR1 py3status'
    }

    systemd {
        format = "{unit}"
        hide_extension = True
        unit = 'syncthing.service'
        user = True
        on_click 1 = 'exec --no-startup-id sudo systemctl --user restart syncthing; exec --no-startup-id killall -USR1 py3status'
        on_click 3 = 'exec --no-startup-id sudo systemctl --user stop syncthing; exec --no-startup-id killall -USR1 py3status'
    }
}

# fixed columns

order += "group gitlab"
group gitlab {
    cycle = 30
    format = "{output}"

    gitlab {
        auth_token = "xxx"
        project = "https://gitlab.scudos.eu/Scudos/Scudos"
        format = '[\?if=name [\?color=orangered&show ] {name} ]'
        format += '[\?if=open_merge_requests_count [\?show {open_merge_requests_count}]]'
    }

    gitlab {
        auth_token = "xxx"
        project = "https://gitlab.scudos.eu/Scudos/Galea"
        format = '[\?if=name [\?color=orangered&show ] {name} ]'
        format += '[\?if=open_merge_requests_count [\?show {open_merge_requests_count}]]'
    }

    gitlab {
        auth_token = "xxx"
        project = "https://gitlab.scudos.eu/Scudos/Scutum"
        format = '[\?if=name [\?color=orangered&show ] {name} ]'
        format += '[\?if=open_merge_requests_count [\?show {open_merge_requests_count}]]'
    }
}

order += "group disks"
group disks {
    cycle = 30
    format = "{output}"

    diskdata root {
        cache_timeout = 900
        disk = "/dev/mapper/root"
        unit = G
        format = " / {used_percent}% {free}{unit}"
        on_click 1 = "exec --no-startup-id spacefm; refresh"
    }

    diskdata boot {
        cache_timeout = 900
        disk = "sda1"
        unit = G
        format = " /boot {used_percent}% {free}{unit}"
        on_click 1 = "exec --no-startup-id spacefm; refresh"
    }
}

order += "uname"
uname {
    color = 'FF00FF'
    format = " {release}"
}

order += "ethernet tun0"
ethernet tun0 {
        format_up = " %ip"
        format_down = ""
}

order += "ethernet tun1"
ethernet tun1 {
        format_up = " %ip"
        format_down = ""
}

order += "ethernet tun2"
ethernet tun2 {
        format_up = " %ip"
        format_down = ""
}

order += "ethernet ppp0"
ethernet ppp0 {
        format_up = " %ip"
        format_down = ""
}

order += "ipv6"
ipv6 {
    format_up = "%ip"
    format_down = ""
}

order += "wireless wlan0"
wireless wlan0 {
    #format_up = " (%bitrate %quality %essid) %ip"
    format_up = " (%quality %essid) %ip"
    format_down = ""
    on_click 2 = "exec --no-startup-id sudo systemctl stop netctl-auto@wlan0.service; exec --no-startup-id killall -USR1 py3status"
    on_click 3 = "exec --no-startup-id sudo systemctl restart netctl-auto@wlan0.service; exec --no-startup-id killall -USR1 py3status"
}

order += "ethernet eth0"
ethernet eth0 {
    format_up = " %ip"
    format_down = ""
    on_click 2 = "exec --no-startup-id sudo systemctl stop netctl-ifplugd@eth0.service; exec --no-startup-id killall -USR1 py3status"
    on_click 3 = "exec --no-startup-id sudo systemctl restart netctl-ifplugd@eth0.service; exec --no-startup-id killall -USR1 py3status"
}

order += "external_script route"
external_script route {
    cache_timeout = 900
    format = "GW: {output}"
    script_path = "/usr/bin/sh -c \"ip r show default | cut -d' ' -f5\""
}

order += "group temps"
group temps {
    cycle = 5
    format = "{output}"

    #cpu_usage {
    #    format = " %usage"
    #}

    #cpu_temperature 0 {
    #    format = " %degrees°C"
    #    max_threshold = 80
    #}

    loadavg {
        #format = " i%1min %5min %15min"
        format = '[\?color=1avg {1min}] [\?color=5avg {5min}] [\?color=15avg {15min}]'
        max_threshold = "4,1"
        on_click 1 = "refresh"
    }

    lm_sensors {
        format_chip = '[\?if=name=coretemp-isa-0000 CPU]'
        format_chip += ' {format_sensor}'
        format_sensor = '\?color=auto.input {input}°C'
        sensors = ['core*']
        on_click 1 = "refresh"
    }

    #sysdata {
    #    format = "{cpu_freq_avg}{cpu_freq_unit} [\?color=cpu {cpu_used_percent}%]"
    #    thresholds = [(0, "white"), (15, "good"), (50, "degraded"), (90, "bad")]
    #    on_click 1 = "refresh"
    #}

    sysdata {
        format = "[\?color=mem {mem_used}]/{mem_total} {mem_unit}"
        thresholds = [(0, "white"), (15, "good"), (40, "degraded"), (65, "bad")]
        on_click 1 = "refresh"
    }
}

order += "volume master"
volume master {
        format = " %volume"
        format_muted = " (%volume)"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
        on_click 1 = "exec --no-startup-id amixer --quiet set Master toggle; exec --no-startup-id killall -USR1 py3status"
        on_click 3 = "exec --no-startup-id amixer --quiet set Capture toggle; exec --no-startup-id killall -USR1 py3status"
        on_click 4 = "exec --no-startup-id amixer --quiet set Master 5%+; exec --no-startup-id killall -USR1 py3status"
        on_click 5 = "exec --no-startup-id amixer --quiet set Master 5%-; exec --no-startup-id killall -USR1 py3status"
}

order += "pomodoro"
pomodoro {
    display_bar = True
    format_active = "{ss} [{bar}]"
    format_stopped = "{ss} [{bar}]"
    format_break = "Break #{breakno} {ss}"
    format_break_stopped = "Break #{breakno} {ss}"
    color_bad = white
    timer_pomodoro = 1500
    timer_break = 300
    sound_pomodoro_end = "/usr/share/sounds/freedesktop/stereo/alarm-clock-elapsed.oga"
    sound_break_end = "/usr/share/sounds/freedesktop/stereo/alarm-clock-elapsed.oga"
}

order += "timer"
timer {
    format = " {timer}"
    time = 300
    sound = "/usr/share/sounds/freedesktop/stereo/alarm-clock-elapsed.oga"
}

order += "battery_level"
battery_level {
    format = "{icon} {percent}% {time_remaining}"
    charging_character = ""
    blocks = ""
    measurement_mode = "sys"
    notify_low_level = True
    hide_seconds = True
    hide_when_full = True
    threshold_bad = 15
    threshold_degraded = 30
    threshold_full = 95
    on_click 4 = "exec --no-startup-id xbacklight -inc 10; exec --no-startup-id killall -USR1 py3status"
    on_click 5 = "exec --no-startup-id xbacklight -dec 10; exec --no-startup-id killall -USR1 py3status"
}

order += "tztime local"
tztime local {
    format = " %H:%M %a %d.%m"
    on_click 4 = "exec --no-startup-id xbacklight -inc 10; exec --no-startup-id killall -USR1 py3status"
    on_click 5 = "exec --no-startup-id xbacklight -dec 10; exec --no-startup-id killall -USR1 py3status"
}

